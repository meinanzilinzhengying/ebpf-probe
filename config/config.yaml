probe_id: node-probe
interface: eth0
clickhouse_addr: 127.0.0.1
clickhouse_user: default
clickhouse_password: ""
clickhouse_database: cloudflow
api_port: "9090"

# 采集器开关
collectors:
  # P0 核心采集器（默认开启）
  network_flow: true
  process_exec: true
  file_open: true
  tcp_connect: true
  host_metrics: true
  # P1 扩展采集器（默认关闭）
  syscall: false
  http_trace: false
  dns_trace: false
  db_trace: false
  # P2 高级采集器（默认关闭）
  sched_trace: false
  mem_trace: false
  block_trace: false
  security_trace: false

# 过滤规则
filters:
  ignore_loopback: true
  ignore_ports: []
  ignore_ips: []
